# THRONG v2 — Phase 4: Pure Emergence Architecture
#
# USE: python main.py --config config_phase4.yaml --fresh
#
# Three major architectural changes from Phase 3:
# 1. Procedural walls + localized resource patches (featureless torus killed)
# 2. Discrete token bottleneck (Gumbel-Softmax, V=64) — no continuous signals
# 3. Per-agent energy mechanic — starvation pressure, resource-seeking
#
# The agents must build a discrete language from scratch to navigate
# hazards, find food, and communicate threats. Zero human linguistic priors.

grid_size: 128
window_size: 1200

population_size: 500
red_population_size: 75
min_population: 40
min_red_population: 30

# Curriculum
curriculum_red_count: 6
curriculum_blue_threshold: 80
curriculum_sustain_steps: 2000

max_age: 20000
base_maturation_steps: 200

# Brain architecture — already scaled up in Phase 3
n_layers: 2
brain_max_layers: 6
brain_token_dim: 128
brain_n_heads: 4
agent_hidden_dim: 256
signal_dim: 32
symbol_dim: 16

neighbor_k: 6
local_obs_radius: 1

# Theory of mind head
tom_enabled: true
tom_lr: 1.0e-4
tom_reward_coef: 0.01
tom_head_independent: true

# Signal gate
signal_gate_enabled: true
signal_gate_mask_frac: 0.5

symbol_decay: 0.993

red_starvation_steps: 400
red_spawn_step: 2000
red_catch_radius: 0

# ── Discrete token bottleneck (Phase 4) ───────────────────────────────────────
vocab_size: 64               # number of abstract tokens agents can emit
gumbel_tau: 1.5               # Gumbel-Softmax temperature — high to prevent early token hardening
signal_entropy_coef: 0.02     # entropy bonus on signal logits to prevent token monoculture

# ── Anneal: diversity → crystallization ──────────────────────────────────────
# Gradually harden tokens after diversity period so symbols crystallize into crisp meanings
gumbel_tau_start: 1.5          # initial tau (soft sampling)
gumbel_tau_end: 0.5            # final tau (hard symbols)
gumbel_tau_anneal_start: 20000  # step where anneal begins
gumbel_tau_anneal_end: 50000    # step where anneal finishes
signal_entropy_coef_start: 0.02
signal_entropy_coef_end: 0.001
signal_entropy_anneal_start: 20000
signal_entropy_anneal_end: 50000

# ── Procedural environment (Phase 4) ──────────────────────────────────────────
wall_density: 0.08            # fraction of grid cells that are walls
resource_n_patches: 20        # number of resource clusters
resource_regen_rate: 0.005    # bumped: keep patches variable for communication value

# ── Energy mechanics (Phase 4) ──────────────────────────────────────────────
energy_decay: 0.001           # energy lost per step
starvation_threshold: 0.05     # energy below this = death
reward_starvation: -0.5       # penalty for starving
reward_resource: 0.1          # bonus per unit of energy gained from resources

# ── MAPPO ─────────────────────────────────────────────────────────────────────
ppo_rollout_steps: 512
ppo_epochs: 1
ppo_minibatch_size: 4096
ppo_warmup_steps: 15
ppo_clip: 0.2
ppo_lr: 3.0e-4
ppo_gamma: 0.99
ppo_gae_lam: 0.95
ppo_value_coef: 0.25
ppo_entropy_coef: 0.05        # high entropy to prevent monoculture
ppo_max_grad_norm: 2.0

# Rewards
reward_blue_alive: 0.05
reward_blue_caught: -1.0
reward_blue_red_proximity: -0.01
reward_red_catch: 1.0
reward_red_starve_per_step: -0.01
reward_move: 0.01            # still active to prevent freeze

red_detection_radius: 4

brain_vote_interval: 5000
brain_vote_survival_threshold: 0.55
force_brain_layers: 4          # force brain depth expansion on resume (pre-allocated layers, no reinit)

# ── Misc ──────────────────────────────────────────────────────────────────────
steps_per_render: 32
target_fps: 60
dashboard_update_interval: 20.0

log_dir: runs_large
checkpoint_interval: 2000
log_interval: 200

mi_analysis_interval: 1000
mi_window: 1000
signal_cluster_k: 12

# Signal corpus (offline language analysis)
corpus_sample_frac: 0.08
corpus_every_n_steps: 20

# Within-lifetime Hebbian learning
hebb_lr: 0.001

# Alarm call analysis
alarm_scout_range: 8
alarm_min_group: 20

exit_on_graduation: false
